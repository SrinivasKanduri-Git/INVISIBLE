- audit prod-readiness → Read layer3-max-performance/_core5/prod-readiness-auditor/SKILL.md and run it.
- audit security → Read layer3-max-performance/_core5/security-auditor/SKILL.md and run it.
- refactor → Read layer3-max-performance/_core5/refactor-planner/SKILL.md and run it.
- perf → Read layer3-max-performance/_extended8/perf-investigator/SKILL.md and run it.
- trd → Read layer3-max-performance/_extended8/trd-generator/SKILL.md and run it.
- design → Read layer3-max-performance/_extended8/design-doc-generator/SKILL.md and run it.
- openapi → Read layer3-max-performance/_extended8/openapi-generator/SKILL.md and run it.
- runbook → Read layer3-max-performance/_extended8/runbook-generator/SKILL.md and run it.
