description = "INVISIBLE safeguard skillset. Usage: /invisible <subcommand> [args]. Subcommands: status, map, spec, prd, audit prod-readiness, audit security, refactor, perf, trd, design, openapi, runbook, data-model, onboarding, validate-rule, refresh-patterns."
prompt = "User invoked /invisible {{args}}. Read ~/.claude/invisible-skillset/meta/invisible-loader.md if not already in context, then dispatch on the first arg token. status (or empty args): report DECIDER state, loaded skills, circuit-breaker, layer3_enabled list. map: Read layer3-max-performance/_core5/codebase-map/SKILL.md and run it. spec: Read layer3-max-performance/_core5/spec-generator/SKILL.md and run it. prd: Read layer3-max-performance/_extended8/prd-generator/SKILL.md. audit: dispatch to prod-readiness-auditor or security-auditor in _core5/ based on second arg. refactor: _core5/refactor-planner/SKILL.md. perf: _extended8/perf-investigator/SKILL.md. trd, design, openapi, runbook, data-model, onboarding: corresponding _extended8/<name>-generator (or -designer / -doc-generator) SKILL.md. validate-rule: meta/rule-validator.md dry-run on the quoted rule text. refresh-patterns: meta/pattern-scan-budget.md rebuild of ~/.claude/invisible/<project-hash>/discovered-patterns.json. Honour L3 cap: ≤1 active per turn. If a target path is missing, list available L3 skills from layer3-max-performance/ and stop."
